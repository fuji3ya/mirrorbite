name: iOS Build (EAS local on macOS)

# Build a production iOS .ipa on a GitHub-hosted macOS runner using
# `eas build --local`. This bypasses EAS Cloud quota (Free 15 iOS/month)
# and uses the public-repo unlimited macOS minutes instead.
#
# Triggers:
#   - Manual via workflow_dispatch (with auto-submit toggle)
#   - Push to main that touches app code (skips on docs-only)
#
# Required GitHub Secrets:
#   EXPO_TOKEN                  — Expo access token (mirrorbite-eas)
#   ASC_API_KEY_P8_B64          — App Store Connect API .p8 file, base64-encoded
#   ASC_API_KEY_ID              — e.g. REDACTED-KEY-ID
#   ASC_API_KEY_ISSUER_ID       — e.g. REDACTED-ISSUER-...
#   IOS_DIST_P12_B64            — Distribution .p12, base64-encoded
#   IOS_DIST_P12_PASSWORD       — .p12 password
#   IOS_PROVISIONING_PROFILE_B64 — .mobileprovision, base64-encoded
#   EXPO_PUBLIC_MB_CLIENT_SECRET — Worker shared secret
#   EXPO_PUBLIC_RC_API_KEY_IOS  — RevenueCat iOS public key (appl_xxx)
#   EXPO_PUBLIC_VISION_API_URL  — Cloudflare Worker URL

on:
  workflow_dispatch:
    inputs:
      auto_submit:
        description: 'Auto-submit to App Store Connect after build'
        type: boolean
        required: false
        default: false
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'lib/**'
      - 'components/**'
      - 'assets/**'
      - 'package.json'
      - 'package-lock.json'
      - 'app.json'
      - 'eas.json'
      - '.github/workflows/ios-build.yml'

jobs:
  build-ios:
    name: Build iOS production .ipa
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode (need iOS 26 SDK for expo-image-picker)
        run: |
          echo "=== Available Xcode versions ==="
          ls /Applications | grep -i xcode || true
          # Prefer Xcode 26.x (iOS 26 SDK required by expo-image-picker @ SDK 54+)
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            XCODE=$(ls -d /Applications/Xcode_17*.app 2>/dev/null | sort -V | tail -1)
          fi
          if [ -z "$XCODE" ]; then
            XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          fi
          echo "Selected: $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS / Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Restore iOS credentials
        env:
          DIST_P12_B64: ${{ secrets.IOS_DIST_P12_B64 }}
          DIST_P12_PASSWORD: ${{ secrets.IOS_DIST_P12_PASSWORD }}
          PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_B64 }}
          ASC_KEY_B64: ${{ secrets.ASC_API_KEY_P8_B64 }}
          ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
        run: |
          mkdir -p .secrets
          echo "$DIST_P12_B64" | base64 -d > .secrets/ios_distribution.p12
          echo "$PROFILE_B64" | base64 -d > .secrets/Mirrorbite_AppStore.mobileprovision
          echo "$ASC_KEY_B64" | base64 -d > .secrets/AuthKey_${ASC_KEY_ID}.p8
          cat > credentials.json <<EOF
          {
            "ios": {
              "provisioningProfilePath": ".secrets/Mirrorbite_AppStore.mobileprovision",
              "distributionCertificate": {
                "path": ".secrets/ios_distribution.p12",
                "password": "${DIST_P12_PASSWORD}"
              }
            }
          }
          EOF

      - name: Write production env vars
        env:
          MB_SECRET: ${{ secrets.EXPO_PUBLIC_MB_CLIENT_SECRET }}
          RC_KEY: ${{ secrets.EXPO_PUBLIC_RC_API_KEY_IOS }}
          VISION_URL: ${{ secrets.EXPO_PUBLIC_VISION_API_URL }}
        run: |
          cat > .env.local <<EOF
          EXPO_PUBLIC_MB_CLIENT_SECRET=${MB_SECRET}
          EXPO_PUBLIC_RC_API_KEY_IOS=${RC_KEY}
          EXPO_PUBLIC_VISION_API_URL=${VISION_URL}
          EXPO_PUBLIC_REVIEW_MODE=0
          EOF

      - name: Inject EAS project link (kept out of the public repo for OPSEC)
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
          EXPO_OWNER: ${{ secrets.EXPO_OWNER }}
          VISION_URL: ${{ secrets.EXPO_PUBLIC_VISION_API_URL }}
        run: |
          # app.json is committed WITHOUT expo.owner / extra.eas.projectId so the
          # owner handle never appears in this public repo (OPSEC). But
          # `eas build --local` with appVersionSource=remote needs the project
          # link, so we inject it at build time from secrets. (Removing these
          # without re-injecting is what broke the earlier build:
          # "EAS project not configured".)
          #
          # ALSO: eas.json's build.production.env.EXPO_PUBLIC_VISION_API_URL is
          # committed REDACTED for OPSEC, and eas.json env OVERRIDES .env.local,
          # so without re-injecting it the build bakes a non-existent worker host
          # → "camera can't reach the server". Inject the real URL here too.
          node -e '
            const fs = require("fs");
            const p = "app.json";
            const j = JSON.parse(fs.readFileSync(p, "utf8"));
            j.expo = j.expo || {};
            j.expo.owner = process.env.EXPO_OWNER;
            j.expo.extra = j.expo.extra || {};
            j.expo.extra.eas = j.expo.extra.eas || {};
            j.expo.extra.eas.projectId = process.env.EAS_PROJECT_ID;
            fs.writeFileSync(p, JSON.stringify(j, null, 2));
            console.log("Injected owner=" + j.expo.owner + " projectId=" + (j.expo.extra.eas.projectId ? "SET" : "MISSING"));
            // eas.json: replace REDACTED vision URL with the real one from secrets
            const ep = "eas.json";
            const e = JSON.parse(fs.readFileSync(ep, "utf8"));
            for (const prof of ["production", "review-submission", "preview"]) {
              const env = (((e.build||{})[prof]||{}).env);
              if (env && env.EXPO_PUBLIC_VISION_API_URL) env.EXPO_PUBLIC_VISION_API_URL = process.env.VISION_URL;
            }
            fs.writeFileSync(ep, JSON.stringify(e, null, 2));
            console.log("Injected eas.json VISION_API_URL =", process.env.VISION_URL ? "SET" : "MISSING");
          '

      - name: EAS build (local)
        run: |
          eas build \
            --platform ios \
            --profile production \
            --local \
            --non-interactive \
            --output build.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: mirrorbite-ios-ipa
          path: build.ipa
          retention-days: 7

      - name: Pre-submission check (static rules, no LLM in CI)
        if: ${{ inputs.auto_submit == true }}
        run: |
          # Pulled from workspace at build time. In OSS public repo we keep a
          # self-contained copy so CI can run without the full workspace.
          # The check matches what `npm run pre-check:fast` runs locally.
          if [ -f ".claude/skills/pre-submission-check/check.py" ]; then
            python3 ".claude/skills/pre-submission-check/check.py" . --no-llm --output pre-check-report.md
            CRIT=$(grep -E "CRITICAL fail.*?\*\*([0-9]+)\*\*" pre-check-report.md | head -1 | sed -E 's/.*\*\*([0-9]+)\*\*.*/\1/')
            CRIT=${CRIT:-0}
            echo "CRITICAL count: $CRIT"
            cat pre-check-report.md | head -50
            if [ "$CRIT" -gt 0 ]; then
              echo "::error::$CRIT CRITICAL pre-submission issues. Blocking auto-submit."
              exit 1
            fi
          else
            echo "::warning::pre-submission-check not found, skipping gate (workspace-only tool)"
          fi

      - name: Upload pre-check report artifact
        if: ${{ inputs.auto_submit == true && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pre-submission-check-report
          path: pre-check-report.md
          if-no-files-found: ignore
          retention-days: 14

      - name: Inject submit credentials into eas.json (OPSEC — redacted in repo)
        if: ${{ inputs.auto_submit == true }}
        env:
          ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
        run: |
          # eas.json submit.production.ios is committed with REDACTED
          # appleId / ascApiKeyId / ascApiKeyIssuerId for OPSEC. eas submit
          # reads them from eas.json, so inject the real values at submit time
          # from secrets. ascApiKeyPath must match the .p8 the Restore step
          # wrote (AuthKey_<keyId>.p8).
          node -e '
            const fs = require("fs");
            const p = "eas.json";
            const j = JSON.parse(fs.readFileSync(p, "utf8"));
            const ios = ((j.submit||{}).production||{}).ios;
            if (!ios) { console.error("submit.production.ios missing"); process.exit(1); }
            ios.appleId = process.env.APPLE_ID;
            ios.ascApiKeyId = process.env.ASC_KEY_ID;
            ios.ascApiKeyIssuerId = process.env.ASC_ISSUER;
            ios.ascApiKeyPath = "./.secrets/AuthKey_" + process.env.ASC_KEY_ID + ".p8";
            fs.writeFileSync(p, JSON.stringify(j, null, 2));
            console.log("Injected submit creds: appleId/ascApiKeyId/issuerId/keyPath SET");
          '

      - name: Submit to App Store Connect
        if: ${{ inputs.auto_submit == true }}
        env:
          ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
        run: |
          eas submit \
            --platform ios \
            --path build.ipa \
            --non-interactive \
            --profile production

      # POST-PROCESSING (run from the workspace, NOT in CI):
      #   eas submit only UPLOADS the binary. Apple then spends ~5-30 min
      #   processing it, during which the build is not yet VALID — so the
      #   build-to-version attach, internal-group attach, and price=Free steps
      #   cannot run here (the build isn't selectable until processing ends).
      #   This is exactly why those three steps were done manually 3x during
      #   the Mirrorbite 1.0 ship. Once Apple finishes processing, run:
      #
      #     python apps/<app>/scripts/asc-finalize-app.py
      #
      #   It is idempotent and drives the version to "Submit button active":
      #   latest VALID build -> version + internal group + price=Free + report.
      #   See generated/research/handovers/2026-05-28-mirrorbite-ship-retrospective.md
